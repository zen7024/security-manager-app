<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>漢字辞典</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'Hiragino Kaku Gothic ProN','Meiryo','Yu Gothic',sans-serif;background:#f0f4f8;color:#222;min-height:100vh}
    .header{background:linear-gradient(135deg,#1a237e,#1565c0);color:#fff;padding:16px;text-align:center;font-size:22px;font-weight:bold;position:sticky;top:0;z-index:100;box-shadow:0 3px 8px rgba(0,0,0,.3);letter-spacing:.05em}
    .header small{display:block;font-size:12px;font-weight:normal;color:#90caf9;margin-top:2px}
    .tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;position:sticky;top:58px;z-index:99;box-shadow:0 2px 4px rgba(0,0,0,.08)}
    .tab{flex:1;padding:12px 2px;text-align:center;font-size:12px;cursor:pointer;border-bottom:4px solid transparent;color:#777;transition:all .2s;user-select:none}
    .tab.active{color:#1565c0;border-bottom-color:#1565c0;font-weight:bold}
    .tc{display:none;padding:14px} .tc.active{display:block}

    /* CANVAS */
    .cwrap{display:flex;flex-direction:column;align-items:center;gap:12px}
    .clabel{font-size:15px;color:#555;text-align:center;line-height:1.6}
    #hw-canvas{background:#fff;border:3px solid #bbdefb;border-radius:16px;touch-action:none;box-shadow:0 3px 12px rgba(0,0,0,.12);cursor:crosshair;display:block}
    .scounter{font-size:18px;color:#1565c0;font-weight:bold;min-height:26px}
    .brow{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
    .btn{padding:12px 16px;border:none;border-radius:10px;font-size:15px;cursor:pointer;transition:all .15s;min-height:48px;font-family:inherit;font-weight:500}
    .btn:active{opacity:.72;transform:scale(.96)}
    .btn-p{background:#1565c0;color:#fff;font-size:17px;padding:13px 28px;box-shadow:0 3px 8px rgba(21,101,192,.35)}
    .btn-s{background:#e8eef8;color:#1565c0}
    .btn-c{background:#fce4ec;color:#c62828}

    /* STROKE RESULTS */
    #hw-res{width:100%}
    .rh{text-align:center;font-size:14px;color:#777;margin:10px 0 6px}
    .cands{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
    .cb{width:60px;height:60px;font-size:28px;background:#fff;border:2px solid #90caf9;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.08);transition:all .15s}
    .cb:active{background:#1565c0;color:#fff;border-color:#1565c0}
    .cb.dim{font-size:22px;border-color:#ddd;color:#999}

    /* DIRECT STROKE SEARCH */
    .sc-sec{margin-top:14px}
    .sc-title{font-size:13px;color:#90a4ae;font-weight:bold;margin-bottom:8px;text-align:center}
    .sc-row{display:flex;gap:8px;align-items:center;justify-content:center;margin-bottom:10px}
    .sc-in{width:76px;padding:10px;font-size:20px;text-align:center;border:2px solid #cfd8dc;border-radius:10px;outline:none;font-family:inherit}
    .sc-in:focus{border-color:#1565c0}

    /* READING SEARCH */
    .sform{display:flex;gap:8px;margin-bottom:14px}
    .sin{flex:1;padding:13px 14px;font-size:18px;border:2px solid #cfd8dc;border-radius:10px;outline:none;font-family:inherit;background:#fff}
    .sin:focus{border-color:#1565c0}
    .sbtn{background:#1565c0;color:#fff;border:none;border-radius:10px;padding:0 18px;font-size:20px;cursor:pointer;min-width:52px}
    .sbtn:active{opacity:.75}
    .kgrid{display:flex;flex-wrap:wrap;gap:8px}
    .kc{width:64px;height:64px;font-size:34px;background:#fff;border:2px solid #e0e0e0;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(0,0,0,.08);transition:all .15s}
    .kc:active{border-color:#1565c0;background:#e3f2fd}

    /* NANROKU TAB */
    .nr-cat{margin-bottom:20px}
    .nr-cat-title{font-size:15px;font-weight:bold;color:#1a237e;margin-bottom:10px;padding:6px 0;border-bottom:2px solid #e8eaf6}
    .nr-items{display:flex;flex-direction:column;gap:8px}
    .nr-item{background:#fff;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);cursor:pointer;transition:all .15s}
    .nr-item:active{background:#e3f2fd}
    .nr-kanji{font-size:28px;min-width:60px;color:#222}
    .nr-arrow{font-size:18px;color:#90a4ae;flex-shrink:0}
    .nr-reading{font-size:18px;font-weight:bold;color:#1565c0}
    .nr-meaning{font-size:12px;color:#888;margin-top:2px}
    /* 古字 */
    .ko-item{background:#fff;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);cursor:pointer;transition:all .15s;margin-bottom:8px}
    .ko-item:active{background:#fff8e1}
    .ko-old{font-size:32px;color:#1a237e;min-width:44px}
    .ko-new{font-size:14px;color:#888}
    .ko-info{flex:1}
    .ko-name{font-size:14px;color:#555;margin-top:2px}
    .ko-stroke{font-size:12px;color:#aaa}

    /* MODAL */
    .movl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end}
    .movl.active{display:flex}
    .modal{background:#fff;border-radius:24px 24px 0 0;padding:26px 20px 34px;width:100%;max-height:88vh;overflow-y:auto;animation:su .28s ease;position:relative}
    @keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .mcls{position:absolute;top:16px;right:16px;background:#f0f0f0;border:none;font-size:18px;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#555}
    .mkbig{font-size:82px;text-align:center;line-height:1.15;margin-bottom:6px}
    .fbtn{display:block;margin:0 auto 14px;background:none;border:2px solid #e0e0e0;border-radius:20px;font-size:14px;padding:6px 16px;cursor:pointer;color:#888;transition:all .15s}
    .fbtn.on{background:#fff8e1;border-color:#f9a825;color:#f57f17}
    .igrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
    .icard{background:#f5f7fa;border-radius:10px;padding:10px 6px;text-align:center}
    .il{font-size:11px;color:#999;margin-bottom:4px}
    .iv{font-size:20px;font-weight:bold;color:#333}
    .stitle{font-size:12px;font-weight:bold;color:#90a4ae;letter-spacing:.1em;margin:16px 0 7px}
    .chips{display:flex;flex-wrap:wrap;gap:6px}
    .con{background:#e3f2fd;color:#1565c0;padding:5px 12px;border-radius:20px;font-size:15px}
    .ckun{background:#fff3e0;color:#e65100;padding:5px 12px;border-radius:20px;font-size:15px}
    .cm{background:#f3e5f5;color:#6a1b9a;padding:5px 12px;border-radius:20px;font-size:14px}
    .wi{padding:10px 4px;border-bottom:1px solid #f0f0f0}
    .ww{font-size:20px;font-weight:bold;color:#222}
    .wr{font-size:13px;color:#777;margin-top:2px}
    .wm{font-size:13px;color:#555;margin-top:3px}

    /* UTILS */
    .loading{text-align:center;padding:22px;color:#90a4ae;font-size:15px}
    .err{background:#ffebee;color:#c62828;border-radius:10px;padding:13px 14px;font-size:14px;margin-top:8px}
    .hint{text-align:center;color:#aaa;font-size:14px;padding:18px}
    .rc{font-size:13px;color:#888;margin-bottom:12px}
    .fe{text-align:center;padding:46px 16px;color:#aaa;font-size:16px;line-height:2}
    .src-tag{font-size:11px;background:#e8f5e9;color:#2e7d32;padding:2px 6px;border-radius:6px;margin-left:6px}
    .nr-tab-notice{background:#e8eaf6;border-radius:10px;padding:10px 12px;font-size:13px;color:#3949ab;margin-bottom:16px;line-height:1.5}
    .section-sep{border:none;border-top:2px solid #e8eaf6;margin:20px 0 16px}
    .section-head{font-size:16px;font-weight:bold;color:#1a237e;margin-bottom:12px}
  </style>
</head>
<body>

<div class="header">
  📖 漢字辞典
  <small>難解・古来漢字対応版</small>
</div>

<div class="tabs">
  <div class="tab active" id="tb-w" onclick="sw('w')">✍️ 手書き</div>
  <div class="tab"        id="tb-s" onclick="sw('s')">🔍 読み検索</div>
  <div class="tab"        id="tb-n" onclick="sw('n')">📚 難読・古字</div>
  <div class="tab"        id="tb-f" onclick="sw('f')">⭐ お気に入り</div>
</div>

<!-- ===== 手書き ===== -->
<div id="tc-w" class="tc active">
  <div class="cwrap">
    <p class="clabel">指で漢字を1文字書いて<br>「検索」を押してください</p>
    <canvas id="hw-canvas" width="300" height="300"></canvas>
    <div class="scounter" id="scnt">（まだ書いていません）</div>
    <div class="brow">
      <button class="btn btn-s" onclick="undo()">↩ 一画戻す</button>
      <button class="btn btn-c" onclick="clr()">🗑 全消し</button>
      <button class="btn btn-p" onclick="doSearch()">🔍 検索</button>
    </div>
    <div id="hw-res"></div>
  </div>
  <div class="sc-sec">
    <hr style="border:none;border-top:1px solid #e0e0e0;margin:18px 0 14px">
    <div class="sc-title">📏 画数で直接さがす（1〜29画）</div>
    <div class="sc-row">
      <input type="number" id="sc-in" class="sc-in" min="1" max="29" placeholder="例：8">
      <button class="btn btn-s" onclick="ssc(+document.getElementById('sc-in').value)">検索</button>
    </div>
  </div>
</div>

<!-- ===== 読み検索 ===== -->
<div id="tc-s" class="tc">
  <div class="sform">
    <input type="text" id="sin" class="sin" placeholder="よみかた（あい、カン など）" inputmode="hiragana">
    <button class="sbtn" onclick="searchR()">🔍</button>
  </div>
  <div id="sres"></div>
</div>

<!-- ===== 難読・古字 ===== -->
<div id="tc-n" class="tc">
  <div class="nr-tab-notice">
    💡 読み方が難しい漢字や、昔の字形（旧字体・古来漢字）を集めました。タップすると詳細が見られます。
  </div>

  <!-- 難読漢字 -->
  <div class="section-head">🌿 難読漢字コレクション</div>
  <div id="nr-cats"></div>

  <hr class="section-sep">

  <!-- 旧字体・古来漢字 -->
  <div class="section-head">🏯 旧字体・古来漢字</div>
  <div id="ko-list"></div>
</div>

<!-- ===== お気に入り ===== -->
<div id="tc-f" class="tc">
  <div id="fdisp"></div>
</div>

<!-- ===== MODAL ===== -->
<div id="movl" class="movl" onclick="ocl(event)">
  <div class="modal" id="mbox">
    <button class="mcls" onclick="cm2()">✕</button>
    <div id="mcnt"><div class="loading">読み込み中…</div></div>
  </div>
</div>

const cv=document.getElementById('hw-canvas'), cx=cv.getContext('2d');
function rsz(){const w=Math.min(window.innerWidth-32,340);cv.style.width=cv.style.height=w+'px'} rsz();
window.addEventListener('resize',rsz);
cx.strokeStyle='#1a1a2e'; cx.lineWidth=5; cx.lineCap=cx.lineJoin='round';
let drawing=false,strokes=[],cur=null;

function pos(e){const r=cv.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:Math.round((t.clientX-r.left)*(300/r.width)),y:Math.round((t.clientY-r.top)*(300/r.height))}}
cv.addEventListener('mousedown',sd); cv.addEventListener('mousemove',md); cv.addEventListener('mouseup',ed); cv.addEventListener('mouseleave',ed);
cv.addEventListener('touchstart',e=>{e.preventDefault();sd(e)},{passive:false});
cv.addEventListener('touchmove', e=>{e.preventDefault();md(e)},{passive:false});
cv.addEventListener('touchend',  e=>{e.preventDefault();ed(e)},{passive:false});

function sd(e){drawing=true;const p=pos(e);cur=[[p.x],[p.y]];cx.beginPath();cx.moveTo(p.x,p.y)}
function md(e){if(!drawing)return;const p=pos(e);cur[0].push(p.x);cur[1].push(p.y);cx.lineTo(p.x,p.y);cx.stroke();cx.beginPath();cx.moveTo(p.x,p.y)}
function ed(){if(!drawing)return;drawing=false;if(cur&&cur[0].length>1)strokes.push(cur);cur=null;usc()}

function rda(){cx.clearRect(0,0,300,300);for(const s of strokes){if(s[0].length<2)continue;cx.beginPath();cx.moveTo(s[0][0],s[1][0]);for(let i=1;i<s[0].length;i++)cx.lineTo(s[0][i],s[1][i]);cx.stroke()}}
function usc(){const el=document.getElementById('scnt');el.textContent=strokes.length?strokes.length+' 画書きました':'（まだ書いていません）'}
function undo(){strokes.pop();rda();usc();document.getElementById('hw-res').innerHTML=''}
function clr(){strokes=[];cx.clearRect(0,0,300,300);usc();document.getElementById('hw-res').innerHTML=''}

// Google IME 手書き認識（HTTP経由のみ動作）
// ══════════════════════════════════════════════
async function tryGoogleIME(strokes){
  // タイムスタンプを付加（Google IME APIが必要とするため）
  const ink = strokes.map(s => {
    const n = s[0].length;
    const ts = Array.from({length:n}, (_,i) => i * 50); // 50ms間隔の仮タイムスタンプ
    return [s[0], s[1], ts];
  });
  const res = await fetch(
    'https://inputtools.google.com/request?itc=ja-t-i0-handwrit&num=15&cp=0&cs=1&ie=utf-8&oe=utf-8',
    {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        input_type:0,
        requests:[{language:'ja', writing_guide:{width:300,height:300}, ink:ink}]
      })
    }
  );
  const data = await res.json();
  if(data[0]==='SUCCESS' && Array.isArray(data[1]?.[0]?.[1])){
    return data[1][0][1]; // 全候補の配列（漢字・かな混在）
  }
  return [];
}

function showIMECandidates(cands){
  const div = document.getElementById('hw-res');
  const kanji = cands.filter(c=>/[\u4e00-\u9fff]/.test(c));
  const other = cands.filter(c=>!/[\u4e00-\u9fff]/.test(c));
  if(!kanji.length && !other.length){
    // 形状認識で見つからない → 画数検索にフォールバック
    const msg='<div style="font-size:12px;color:#90a4ae;text-align:center;margin-bottom:8px;padding:6px;background:#f5f5f5;border-radius:6px;">形状では認識できませんでした。画数検索に切り替えます。</div>';
    ssc(strokes.length, msg);
    return;
  }
  let h='<div style="font-size:13px;color:#43a047;text-align:center;margin-bottom:8px;">✅ Google AIで形状認識しました</div>';
  if(kanji.length){
    h+='<div style="font-size:13px;color:#1565c0;font-weight:bold;margin-bottom:6px;">漢字の候補</div>';
    h+='<div class="cands">';
    for(const k of kanji) h+=`<button class="cb" onclick="sd2('${k}')">${k}</button>`;
    h+='</div>';
  }
  if(other.length){
    h+='<div style="font-size:12px;color:#90a4ae;margin:10px 0 5px;">その他の候補（かな・記号）</div>';
    h+='<div class="cands">';
    for(const k of other.slice(0,8)) h+=`<button class="cb dim" style="font-size:20px;border-color:#ddd;color:#888" onclick="alert('${k}')">${k}</button>`;
    h+='</div>';
  }
  // 画数検索も補足表示
  h+=`<details style="margin-top:14px"><summary style="font-size:12px;color:#90a4ae;cursor:pointer">📏 画数でも検索する（${strokes.length}画）</summary><div id="sc-fallback"></div></details>`;
  div.innerHTML=h;
  // 非同期で画数候補も追加
  setTimeout(()=>{ const f=document.getElementById('sc-fallback'); if(f) ssc2(strokes.length,f); },100);
}

function ssc2(n,targetDiv){
  const RANGE=2; const MAX=12; let html='';
  for(let d=0;d<=RANGE;d++){
    const cs=d===0?[n]:[n-d,n+d].filter(x=>x>=1&&x<=34);
    for(const sc of cs){
      const ks=SM[sc]||[]; if(!ks.length)continue;
      const shown=ks.slice(0,MAX); const rest=ks.length-shown.length;
      html+=`<div style="font-size:12px;color:#90a4ae;margin:6px 0 4px;">${sc}画（${ks.length}文字）</div><div class="cands">`;
      for(const k of shown) html+=`<button class="cb dim" style="font-size:20px;border-color:#ddd;color:#999" onclick="sd2('${k}')">${k}</button>`;
      if(rest>0) html+=`<span style="font-size:12px;color:#aaa;align-self:center;padding:4px 6px;">他 ${rest}文字</span>`;
      html+='</div>';
    }
  }
  targetDiv.innerHTML=html||'<div class="hint">画数データなし</div>';
}

async function doSearch(){
  if(!strokes.length){document.getElementById('hw-res').innerHTML='<div class="err">漢字を書いてから「検索」を押してください</div>';return}

  if(IS_HTTP){
    // HTTP経由 → Google IME形状認識
    const div=document.getElementById('hw-res');
    div.innerHTML='<div class="loading">✨ Google AIで形状認識中…</div>';
    try{
      const cands = await tryGoogleIME(strokes);
      showIMECandidates(cands);
    }catch(e){
      console.warn('[Google IME error]', e);
      const msg='<div style="font-size:12px;color:#e57373;text-align:center;margin-bottom:8px;padding:6px;background:#fff3f3;border-radius:6px;">⚠️ Google認識エラー：'+e.message+'</div>';
      ssc(strokes.length, msg);
    }
  } else {
    // file:// → 画数検索
    ssc(strokes.length);
  }
}

function ssc(n, prefix=''){
  if(!n||n<1||n>34){document.getElementById('hw-res').innerHTML='<div class="err">画数が範囲外です</div>';return}
  const div=document.getElementById('hw-res');
  // 表示上限：ぴったり画数は30文字、±差は15文字
  const EXACT_MAX=30, NEAR_MAX=15;
  const RANGE=2; let hasAny=false,html='';
  for(let d=0;d<=RANGE;d++){
    const cs=d===0?[n]:[n-d,n+d].filter(x=>x>=1&&x<=34);
    for(const sc of cs){
      const ks=SM[sc]||[]; if(!ks.length)continue; hasAny=true;
      const limit=d===0?EXACT_MAX:NEAR_MAX;
      const shown=ks.slice(0,limit);
      const rest=ks.length-shown.length;
      const lbl=d===0?`📏 ${sc}画の漢字`:`　↕ ${sc}画の漢字（±${d}）`;
      const ls=d===0?'font-size:14px;color:#1565c0;font-weight:bold;margin:10px 0 6px;':'font-size:12px;color:#90a4ae;margin:8px 0 5px;';
      const bs=d===0?'':'font-size:22px;border-color:#ddd;color:#999;';
      html+=`<div style="${ls}">${lbl}（${ks.length}文字）</div><div class="cands">`;
      for(const k of shown) html+=`<button class="cb ${d>0?'dim':''}" style="${bs}" onclick="sd2('${k}')">${k}</button>`;
      if(rest>0) html+=`<span style="font-size:12px;color:#aaa;align-self:center;padding:4px 6px;">他 ${rest}文字</span>`;
      html+='</div>';
    }
  }
  if(!hasAny){div.innerHTML=prefix+'<div class="hint">その画数の漢字は見つかりませんでした</div>';return}
  div.innerHTML=prefix+`<p style="font-size:12px;color:#bbb;text-align:center;margin-bottom:6px;">ヒント：手書きは画数がズレやすいです。±2画も確認してください</p>`+html;
}

// 読み検索（kanjiapi.dev + jisho.org バックアップ）
// ══════════════════════════════════════════════
function hira2kata(s){return s.replace(/[\u3041-\u3096]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60))}

async function searchR(){
  const raw=document.getElementById('sin').value.trim(); if(!raw) return;
  const div=document.getElementById('sres');
  div.innerHTML='<div class="loading">検索中…</div>';
  if(/[\u4e00-\u9fff]/.test(raw)){sd2(raw[0]);div.innerHTML='';return}
  let found=[];

  // 読み方バリエーションを生成（動詞形・ドット区切りなど）
  const variants=new Set([raw, hira2kata(raw)]);
  // 末尾が「え」「い」「う」「き」「ち」「り」など → 「る」付きも試す
  if(!raw.endsWith('る')) variants.add(raw+'る');
  // 「〜え」→「〜える」試す（答え→答える、応え→応える）
  if(raw.endsWith('え')) variants.add(raw.slice(0,-1)+'.える');
  if(raw.endsWith('い')) variants.add(raw.slice(0,-1)+'.いる');
  if(raw.endsWith('き')) variants.add(raw.slice(0,-1)+'.く');
  // カタカナ版も追加
  for(const v of [...variants]) variants.add(hira2kata(v));

  try{
    const reqs=[...variants].map(v=>fetch(`https://kanjiapi.dev/v1/reading/${encodeURIComponent(v)}`));
    const results=await Promise.allSettled(reqs);
    for(const r of results){
      if(r.status==='fulfilled'&&r.value.ok){
        const d=await r.value.json();
        found=[...found,...(d.main_kanji||[]),...(d.name_kanji||[])];
      }
    }
    found=[...new Set(found)];
  }catch(e){}

  // 不足ならjisho.orgでバックアップ
  if(found.length<5){
    try{
      const res=await fetch(`https://jisho.org/api/v1/search/words?keyword=${encodeURIComponent(raw)}%20%23kanji`);
      if(res.ok){
        const d=await res.json();
        for(const w of(d.data||[])){
          for(const j of(w.japanese||[])){
            if(j.word&&/[\u4e00-\u9fff]/.test(j.word)&&j.word.length===1) found.push(j.word);
          }
        }
        found=[...new Set(found)];
      }
    }catch(e){}
  }

  if(!found.length){
    div.innerHTML='<div class="err">見つかりませんでした。<br>ひらがな・カタカナで入力してください。<br>（例：あい、コウ、アイ）</div>';
    return;
  }
  div.innerHTML=`<p class="rc">${found.length}件見つかりました</p><div class="kgrid">`+
    found.slice(0,60).map(k=>`<div class="kc" onclick="sd2('${k}')">${k}</div>`).join('')+'</div>';
}
document.getElementById('sin').addEventListener('keypress',e=>{if(e.key==='Enter')searchR()});

async function sd2(k){
  document.getElementById('mcnt').innerHTML='<div class="loading">読み込み中…</div>';
  document.getElementById('movl').classList.add('active');
  document.body.style.overflow='hidden';
  try{
    const[kr,wr]=await Promise.all([
      fetch(`https://kanjiapi.dev/v1/kanji/${encodeURIComponent(k)}`),
      fetch(`https://kanjiapi.dev/v1/words/${encodeURIComponent(k)}`)
    ]);
    const kd=await kr.json();
    const wd=wr.ok?await wr.json():[];
    // jisho.orgから補足情報
    let jd=null;
    try{const jr=await fetch(`https://jisho.org/api/v1/search/words?keyword=${encodeURIComponent(k)}%20%23kanji`);if(jr.ok)jd=await jr.json()}catch(e){}
    renderD(k,kd,wd,jd);
  }catch{
    document.getElementById('mcnt').innerHTML='<div class="err">詳細を取得できませんでした。<br>インターネット接続を確認してください。</div>';
  }
}

function renderD(k,kd,words,jd){
  const fav=isF(k);
  let h=`<div class="mkbig">${k}</div>
    <button class="fbtn ${fav?'on':''}" id="fbtn" onclick="tgF('${k}')">
      ${fav?'⭐ お気に入り済み':'☆ お気に入りに追加'}
    </button>
    <div class="igrid">
      <div class="icard"><div class="il">画数</div><div class="iv">${kd.stroke_count??'—'}</div></div>
      <div class="icard"><div class="il">学年</div><div class="iv">${kd.grade?kd.grade+'年':'—'}</div></div>
      <div class="icard"><div class="il">JLPT</div><div class="iv">${kd.jlpt?'N'+kd.jlpt:'—'}</div></div>
    </div>`;

  if(kd.meanings?.length)
    h+=`<div class="stitle">📝 意味</div><div class="chips">${kd.meanings.map(m=>`<span class="cm">${m}</span>`).join('')}</div>`;

  // jisho補足意味
  if(jd?.data?.[0]?.senses?.[0]?.english_definitions?.length && (!kd.meanings||kd.meanings.length===0)){
    const ms=jd.data[0].senses[0].english_definitions.slice(0,4);
    h+=`<div class="stitle">📝 意味 <span class="src-tag">jisho.org</span></div><div class="chips">${ms.map(m=>`<span class="cm">${m}</span>`).join('')}</div>`;
  }

  if(kd.on_readings?.length)
    h+=`<div class="stitle">🔵 音読み</div><div class="chips">${kd.on_readings.map(r=>`<span class="con">${r}</span>`).join('')}</div>`;
  if(kd.kun_readings?.length)
    h+=`<div class="stitle">🟠 訓読み</div><div class="chips">${kd.kun_readings.map(r=>`<span class="ckun">${r}</span>`).join('')}</div>`;
  if(kd.name_readings?.length)
    h+=`<div class="stitle">👤 名前の読み</div><div class="chips">${kd.name_readings.slice(0,8).map(r=>`<span class="ckun" style="background:#e8f5e9;color:#2e7d32">${r}</span>`).join('')}</div>`;

  const items=[];
  for(const w of(words||[]).slice(0,10)){
    const v=w.variants?.[0]; if(!v)continue;
    const g=w.meanings?.[0]?.glosses?.slice(0,2).join('、')||'';
    items.push(`<div class="wi"><div class="ww">${v.written||''}</div><div class="wr">${v.pronounced||''}</div><div class="wm">${g}</div></div>`);
  }
  if(items.length) h+=`<div class="stitle">📖 例文・単語</div>${items.join('')}`;

  // Unicode参考情報（稀字用）
  const cp=k.codePointAt(0).toString(16).toUpperCase().padStart(5,'0');
  h+=`<div class="stitle" style="margin-top:20px">🔢 Unicode</div><div style="font-size:13px;color:#aaa;padding:4px 0">U+${cp}</div>`;

  document.getElementById('mcnt').innerHTML=h;
}

// 難読・古字タブ 描画
// ══════════════════════════════════════════════
function renderNR(){
  const d=document.getElementById('nr-cats');
  d.innerHTML=NANROKU.map(c=>`
    <div class="nr-cat">
      <div class="nr-cat-title">${c.cat}</div>
      <div class="nr-items">
        ${c.items.map(i=>`
          <div class="nr-item" onclick="sd2('${i.k[0]}')">
            <span class="nr-kanji">${i.k}</span>
            <span class="nr-arrow">→</span>
            <div>
              <div class="nr-reading">${i.r}</div>
              <div class="nr-meaning">${i.m}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');

  const d2=document.getElementById('ko-list');
  d2.innerHTML=KORAI.map(c=>`
    <div class="ko-item" onclick="sd2('${c.o}')">
      <span class="ko-old">${c.o}</span>
      <div class="ko-info">
        <div style="font-size:15px;font-weight:bold;color:#222">${c.n}</div>
        <div class="ko-name">${c.m}</div>
        <div class="ko-stroke">読み：${c.r}　画数：${c.s}画</div>
      </div>
    </div>`).join('');
}

// ══════════════════════════════════════════════
// お気に入り
// ══════════════════════════════════════════════
function gF(){try{return JSON.parse(localStorage.getItem('kj2')||'[]')}catch{return[]}}
function sF(f){localStorage.setItem('kj2',JSON.stringify(f))}
function isF(k){return gF().includes(k)}
function tgF(k){
  let f=gF(); const b=document.getElementById('fbtn');
  if(f.includes(k)){f=f.filter(x=>x!==k);if(b){b.textContent='☆ お気に入りに追加';b.classList.remove('on')}}
  else{f.push(k);if(b){b.textContent='⭐ お気に入り済み';b.classList.add('on')}}
  sF(f); renderF();
}
function renderF(){
  const f=gF(),d=document.getElementById('fdisp');
  if(!f.length){d.innerHTML='<div class="fe">⭐ お気に入りはまだありません<br><br>漢字の詳細画面で<br>「☆ お気に入りに追加」を押してください</div>';return}
  d.innerHTML='<div class="kgrid">'+f.map(k=>`<div class="kc" onclick="sd2('${k}')">${k}</div>`).join('')+'</div>';
}

// ══════════════════════════════════════════════
// タブ / モーダル
// ══════════════════════════════════════════════
function sw(n){
  ['w','s','n','f'].forEach(t=>{
    document.getElementById('tc-'+t).classList.toggle('active',t===n);
    document.getElementById('tb-'+t).classList.toggle('active',t===n);
  });
  if(n==='f')renderF();
}
function cm2(){document.getElementById('movl').classList.remove('active');document.body.style.overflow=''}
function ocl(e){if(e.target===document.getElementById('movl'))cm2()}

// INIT
renderNR();
renderF();
</script>
